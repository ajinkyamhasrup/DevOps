---
- name: Deploy sample WAR to Tomcat
  hosts: localhost
  become: yes

  tasks:

    - name: Copy sample WAR
      copy:
        src: files/sample.war
        dest: /opt/tomcat/webapps/sample.war
        owner: tomcat
        group: tomcat
        mode: '0644'

    - name: Restart Tomcat
      shell: /opt/tomcat/bin/shutdown.sh && sleep 5 && /opt/tomcat/bin/startup.sh
      ignore_errors: yes
